name: Release
on:
  push:
    tags:
      - 'v*'
env:
  CARGO_TERM_COLOR: always
jobs:
  release:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.arg }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, arg: --mac --x64, target: x86_64-apple-darwin }
          - { os: macos-latest, arg: --mac --arm64, target: aarch64-apple-darwin }
          - { os: ubuntu-latest, arg: --linux --x64, target: x86_64-unknown-linux-gnu }
          # - { os: ubuntu-latest, arg: --linux --arm64, target: aarch64-unknown-linux-gnu }
          - { os: windows-latest, arg: --windows --x64, target: x86_64-pc-windows-msvc }
          - { os: windows-latest, arg: --windows --arm64, target: aarch64-pc-windows-msvc }
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Node.js setup
        uses: actions/setup-node@v2
        with:
          node-version: 20

      - name: 'Install dependencies (Linux)'
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt update && sudo apt-get install -y libwayland-dev pkg-config

      - run: npm install
      - run: npm run napi -- --target ${{ matrix.target }}
      - run: npm run build:web
      - run: npm run electron-builder -- ${{ matrix.arg }} --publish always --config.publish.provider github --config.publish.publishAutoUpdate false
        env:
          GH_TOKEN: ${{ secrets.github_token }}
      - run: npm run generate-update-json

      # Do not run in parallel - It can cause errors even with --clobber
      - name: Upload update.json
        if: matrix.target == 'aarch64-apple-darwin'
        run: gh release upload ${{ github.ref_name }} build/update.json
        env:
          GH_TOKEN: ${{ github.token }}
  release_android:
    runs-on: ubuntu-latest
    name: Android ${{ matrix.name }}
    strategy:
      matrix:
        include:
          - { name: arm64, arch: aarch64, tauri_target: aarch64 }
          - { name: x64, arch: x86_64, tauri_target: x86_64 }
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Node.js setup
        uses: actions/setup-node@v2
        with:
          node-version: 20

      - name: JDK 17 Setup
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK Setup
        uses: android-actions/setup-android@v3

      - name: Android NDK Setup
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          link-to-sdk: true

      - name: Install Android targets
        run: rustup target add ${{ matrix.arch }}-linux-android

      - run: npm install
        working-directory: mobile

      - name: Android signing setup
        working-directory: mobile/src-tauri/gen/android
        run: |
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > $RUNNER_TEMP/keystore.jks
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Get version
        run: echo "APP_VERSION=$(jq -r '.version' package.json)" >> $GITHUB_ENV

      - name: Build
        # Unreleased v1 is used to be able to use uploadWorkflowArtifacts and mobile:
        uses: tauri-apps/tauri-action@850c373b94f35e16e4de61cbb9f6e4876af8c0b4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: mobile
          mobile: android
          tagName: v${{ env.APP_VERSION }}
          releaseName: ${{ env.APP_VERSION }}
          releaseDraft: true
          releaseAssetNamePattern: '[name]-v[version]-[platform]-[arch][ext]'
          args: --apk --split-per-abi --target ${{ matrix.tauri_target }} --config '{"version":"${{ env.APP_VERSION }}"}'
